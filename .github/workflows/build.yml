name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Clean build cache
      run: |
        flutter clean
        rm -rf build
        rm -rf .dart_tool
        rm -f pubspec.lock
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Verify theme file
      run: |
        echo "Checking app_theme.dart for CardThemeData..."
        if grep -q "CardThemeData" lib/theme/app_theme.dart; then
          echo "ERROR: Found CardThemeData in app_theme.dart"
          exit 1
        else
          echo "OK: No CardThemeData found"
        fi
    
    - name: Build APK
      run: flutter build apk --release --split-per-abi
    
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apk-files
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 7
