name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # 1. حفظ الكود
          mkdir /tmp/my_code
          cp -r lib /tmp/my_code/
          cp pubspec.yaml /tmp/my_code/

          # 2. حذف كل شيء قديم
          rm -rf android ios linux macos web windows

          # 3. إنشاء مشروع جديد
          flutter create --org com.kimialfa --project-name kimi_alfa .

          # 4. استعادة الكود
          cp -r /tmp/my_code/lib/* lib/
          cp /tmp/my_code/pubspec.yaml .

          # 5. إنشاء مجلدات assets المطلوبة
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts
          echo "test" > assets/images/.gitkeep
          echo "test" > assets/icons/svg/.gitkeep
          echo "test" > assets/animations/.gitkeep
          echo "test" > assets/fonts/.gitkeep

          # 6. تحديث pubspec.yaml ليشمل المجلدات
          sed -i '/uses-material-design: true/a \  assets:\n    - assets/images/\n    - assets/icons/svg/\n    - assets/animations/\n    - assets/fonts/' pubspec.yaml

          # 7. إزالة خطوط fonts إذا كانت موجودة وتسبب مشاكل
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml

          # 8. تثبيت الحزم
          flutter pub get

          # 9. بناء التطبيق
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
