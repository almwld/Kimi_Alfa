name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود بالكامل
          mkdir /tmp/code
          cp -r lib pubspec.yaml assets .env .github /tmp/code/ 2>/dev/null || true
          
          # حذف كل شيء
          rm -rf android ios linux macos web windows
          
          # إنشاء مشروع جديد
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة الكود بالكامل
          cp -r /tmp/code/lib/* lib/
          cp /tmp/code/pubspec.yaml .
          cp -r /tmp/code/assets . 2>/dev/null || true
          cp /tmp/code/.env . 2>/dev/null || true
          
          # إنشاء مجلدات assets المطلوبة
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts
          
          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # تثبيت الحزم
          flutter pub get
          
          # بناء APK
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
