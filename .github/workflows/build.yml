name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # 1. حفظ الكود
          mkdir /tmp/my_code
          cp -r lib /tmp/my_code/
          cp pubspec.yaml /tmp/my_code/

          # 2. حذف كل شيء قديم
          rm -rf android ios linux macos web windows

          # 3. إنشاء مشروع جديد
          flutter create --org com.kimialfa --project-name kimi_alfa .

          # 4. استعادة الكود
          cp -r /tmp/my_code/lib/* lib/
          cp /tmp/my_code/pubspec.yaml .

          # 5. إنشاء مجلدات assets بسيطة
          mkdir -p assets
          echo "test" > assets/.gitkeep

          # 6. تحديث pubspec.yaml إلى نسخة بسيطة
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.4.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            provider: ^6.1.1
            supabase_flutter: ^2.0.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          YAML

          # 7. تحديث Kotlin
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle

          # 8. تثبيت الحزم
          flutter pub get

          # 9. بناء التطبيق
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
