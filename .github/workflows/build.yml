name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود الحقيقي
          mkdir /tmp/real_code
          cp -r lib /tmp/real_code/
          cp pubspec.yaml /tmp/real_code/ 2>/dev/null || true
          cp -r assets /tmp/real_code/ 2>/dev/null || true
          
          # حذف كل شيء
          rm -rf .gitignore android ios linux macos web windows
          
          # إنشاء مشروع Flutter جديد نظيف
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة الكود الحقيقي
          rm -rf lib
          cp -r /tmp/real_code/lib .
          cp /tmp/real_code/pubspec.yaml . 2>/dev/null || true
          cp -r /tmp/real_code/assets . 2>/dev/null || true
          
          # إنشاء مجلدات assets إذا لم تكن موجودة
          mkdir -p assets/images assets/icons assets/fonts
          
          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # تحديث Kotlin
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
          
          # تثبيت الحزم
          flutter pub get
          
          # بناء APK
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
