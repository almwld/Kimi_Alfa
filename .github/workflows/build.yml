name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Save user code
        run: |
          mkdir /tmp/code
          cp -r lib pubspec.yaml /tmp/code/
          if [ -d assets ]; then cp -r assets /tmp/code/; fi

      - name: Clean and recreate project
        run: |
          rm -rf android ios linux macos web windows .gitignore
          flutter create --org com.kimialfa --project-name kimi_alfa .

      - name: Restore code
        run: |
          cp -r /tmp/code/lib/* lib/
          cp /tmp/code/pubspec.yaml .
          if [ -d /tmp/code/assets ]; then cp -r /tmp/code/assets/* assets/; fi

      - name: Create missing asset directories
        run: |
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts
          touch assets/images/.gitkeep
          touch assets/icons/svg/.gitkeep
          touch assets/animations/.gitkeep
          touch assets/fonts/.gitkeep

      - name: Update pubspec.yaml (remove problematic assets)
        run: |
          # إزالة الأسطر التي تسبب مشاكل
          sed -i '/assets\/images\//d' pubspec.yaml
          sed -i '/assets\/icons\/svg\//d' pubspec.yaml
          sed -i '/assets\/animations\//d' pubspec.yaml
          sed -i '/assets\/fonts\//d' pubspec.yaml
          
          # إضافة assets بسيطة
          sed -i '/flutter:/a \  assets:\n    - assets/images/\n    - assets/icons/svg/\n    - assets/animations/\n    - assets/fonts/' pubspec.yaml

      - name: Fix gradle version
        run: |
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties

      - name: Add desugaring
        run: |
          sed -i '/android {/a \    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n        coreLibraryDesugaringEnabled true\n    }' android/app/build.gradle
          sed -i '/dependencies {/a \    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"' android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
