name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود والملفات الأساسية
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp pubspec.yaml /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true
          cp .env /tmp/code/ 2>/dev/null || true
          
          # حذف مجلدات android/ios القديمة
          rm -rf android ios
          
          # إنشاء مشروع Flutter جديد (لإعادة إنشاء android/ios)
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة الكود
          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true
          cp /tmp/code/pubspec.yaml .
          cp /tmp/code/.env . 2>/dev/null || true
          
          # إنشاء مجلدات الأصول الأساسية
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts
          
          # حذف قسم fonts من pubspec.yaml (لتجنب خطأ الملف المفقود)
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml
          
          # حذف cache Gradle بالكامل لإزالة أي بقايا من Kotlin 1.7.1
          rm -rf ~/.gradle/caches/
          
          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # بناء
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
