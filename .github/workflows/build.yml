name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود
          mkdir /tmp/my_code
          cp -r lib /tmp/my_code/ 2>/dev/null || true
          
          # حذف كل شيء
          rm -rf android ios linux macos web windows
          
          # إنشاء مشروع جديد
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة الكود
          cp -r /tmp/my_code/lib/* lib/ 2>/dev/null || true
          
          # إنشاء pubspec.yaml بسيط
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          YAML
          
          # إضافة flutterEmbedding إلى AndroidManifest.xml
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # تحديث Kotlin
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
          
          # تحديث Gradle
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.3-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          
          # تثبيت الحزم
          flutter pub get
          
          # بناء APK
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
