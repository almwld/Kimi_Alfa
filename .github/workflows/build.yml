name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Save user code
        run: |
          mkdir /tmp/code
          cp -r lib /tmp/code/

      - name: Clean and recreate project
        run: |
          rm -rf android ios linux macos web windows .gitignore
          flutter create --org com.kimialfa --project-name kimi_alfa .

      - name: Restore code
        run: cp -r /tmp/code/lib/* lib/

      - name: Create pubspec.yaml
        run: |
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          YAML

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
