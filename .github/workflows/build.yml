name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # 1. حفظ الكود (lib و pubspec.yaml)
          mkdir /tmp/my_code
          cp -r lib /tmp/my_code/
          cp pubspec.yaml /tmp/my_code/

          # 2. حذف مجلد android القديم نهائياً
          rm -rf android ios linux macos web windows

          # 3. إنشاء مشروع جديد (سيُنشئ android بإعدادات نظيفة)
          flutter create --org com.kimialfa --project-name kimi_alfa .

          # 4. استعادة الكود الخاص بك
          cp -r /tmp/my_code/lib/* lib/
          cp /tmp/my_code/pubspec.yaml .

          # 5. تثبيت الحزم
          flutter pub get

          # 6. بناء التطبيق
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
