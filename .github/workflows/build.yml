name: Build Flex Yemen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare assets and fix pubspec
        run: |
          # إنشاء مجلدات الأصول المطلوبة
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts
          
          # إزالة قسم fonts من pubspec.yaml (لأن الملف غير موجود)
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml
          
          # إضافة flutterEmbedding إلى AndroidManifest.xml
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
