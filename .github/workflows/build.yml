name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود الحقيقي
          mkdir /tmp/real_code
          cp -r lib /tmp/real_code/
          cp pubspec.yaml /tmp/real_code/ 2>/dev/null || true
          cp -r assets /tmp/real_code/ 2>/dev/null || true
          
          # حذف كل شيء
          rm -rf .gitignore android ios linux macos web windows
          
          # إنشاء مشروع Flutter جديد نظيف
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة الكود الحقيقي
          rm -rf lib
          cp -r /tmp/real_code/lib .
          
          # إنشاء جميع مجلدات assets المطلوبة
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts
          touch assets/images/.gitkeep
          touch assets/icons/svg/.gitkeep
          touch assets/animations/.gitkeep
          touch assets/fonts/.gitkeep
          
          # إنشاء ملف خط مؤقت إذا لم يكن موجوداً
          if [ ! -f assets/fonts/Changa-SemiBold.ttf ]; then
            echo "placeholder" > assets/fonts/Changa-SemiBold.ttf
          fi
          
          # إنشاء pubspec.yaml جديد مع تصحيح المسارات
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa Marketplace
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.4.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            provider: ^6.1.1
            supabase_flutter: ^2.0.0
            carousel_slider: ^5.1.2
            flutter_animate: ^4.5.0
            flutter_svg: ^2.0.9
            image_picker: ^1.0.7
            cached_network_image: ^3.3.1
            shared_preferences: ^2.2.2
            intl: ^0.18.1
            url_launcher: ^6.2.2
            hive: ^2.2.3
            hive_flutter: ^1.1.0
            path_provider: ^2.1.5
            geolocator: ^11.1.0
            geocoding: ^3.0.0
            flutter_map: ^6.1.0
            latlong2: ^0.9.0
            flutter_local_notifications: ^17.2.4
            firebase_core: ^3.12.1
            firebase_messaging: ^15.2.4
            flutter_dotenv: ^5.1.0
            shimmer: ^3.0.0
            smooth_page_indicator: ^1.1.0
            flutter_screenutil: ^5.9.0
            google_fonts: ^6.1.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.1

          flutter:
            uses-material-design: true
            assets:
              - assets/images/
              - assets/icons/svg/
              - assets/animations/
              - assets/fonts/
          YAML
          
          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # تحديث Kotlin
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
          
          # تثبيت الحزم
          flutter pub get
          
          # بناء APK
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
