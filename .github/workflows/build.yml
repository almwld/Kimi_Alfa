name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الملفات المهمة
          mkdir /tmp/backup
          cp -r lib /tmp/backup/ 2>/dev/null || true
          
          # حذف كل شيء
          rm -rf .gitignore android ios linux macos web windows
          
          # إنشاء مشروع Flutter جديد نظيف
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة مجلد lib فقط
          rm -rf lib
          cp -r /tmp/backup/lib . 2>/dev/null || true
          
          # إزالة أي كود معقد من main.dart مؤقتاً
          cat > lib/main.dart << 'DART'
          import 'package:flutter/material.dart';
          
          void main() {
            runApp(const MyApp());
          }
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
          
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Kimi Alfa',
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                ),
                home: const Scaffold(
                  body: Center(
                    child: Text('Kimi Alfa App'),
                  ),
                ),
              );
            }
          }
          DART
          
          # إنشاء pubspec.yaml بسيط
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa
          publish_to: 'none'
          version: 1.0.0+1
          
          environment:
            sdk: '>=3.4.0 <4.0.0'
          
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
          
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          
          flutter:
            uses-material-design: true
          YAML
          
          # تثبيت الحزم
          flutter pub get
          
          # بناء APK
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
