name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Save user code
        run: |
          mkdir /tmp/code
          cp -r lib /tmp/code/
          if [ -d assets ]; then cp -r assets /tmp/code/; fi

      - name: Clean and recreate project
        run: |
          rm -rf android ios linux macos web windows .gitignore
          flutter create --org com.kimialfa --project-name kimi_alfa .

      - name: Restore code
        run: |
          cp -r /tmp/code/lib/* lib/
          if [ -d /tmp/code/assets ]; then cp -r /tmp/code/assets/* assets/; fi

      - name: Create fresh pubspec.yaml
        run: |
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa Marketplace
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            provider: ^6.1.1
            supabase_flutter: ^2.0.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          YAML

      - name: Create asset directories
        run: |
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts

      - name: Fix gradle version
        run: |
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties

      - name: Add desugaring
        run: |
          sed -i '/android {/a \    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n        coreLibraryDesugaringEnabled true\n    }' android/app/build.gradle
          sed -i '/dependencies {/a \    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"' android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
