name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ lib فقط
          mkdir /tmp/lib
          cp -r lib /tmp/lib/
          
          # حذف كل شيء
          rm -rf android ios
          
          # إنشاء مشروع جديد
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة lib
          rm -rf lib
          cp -r /tmp/lib/lib .
          
          # إنشاء pubspec.yaml بدون path_provider والحركات المعقدة
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa
          publish_to: 'none'
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.4.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            provider: ^6.1.1
            supabase_flutter: ^2.0.0
          
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          
          flutter:
            uses-material-design: true
          YAML
          
          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # تثبيت الحزم
          flutter pub get
          
          # بناء APK
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
