name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود
          mkdir /tmp/code
          cp -r lib pubspec.yaml /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true
          
          # حذف كل شيء
          rm -rf android ios
          
          # إنشاء مشروع جديد
          flutter create --org com.kimialfa --project-name kimi_alfa .
          
          # استعادة الكود
          rm -rf lib
          cp -r /tmp/code/lib .
          cp /tmp/code/pubspec.yaml .
          cp -r /tmp/code/assets . 2>/dev/null || true
          
          # إنشاء جميع مجلدات assets
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts
          
          # إنشاء ملف خط وهمي
          echo "dummy font" > assets/fonts/Changa-SemiBold.ttf
          
          # إزالة أي سطور fonts من pubspec.yaml
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml
          
          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # تحديث Kotlin
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
          
          # تحديث Gradle
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          
          # تثبيت الحزم
          flutter pub get
          
          # بناء APK
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
